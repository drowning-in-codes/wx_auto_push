name: WeChat Auto Push CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. 检查与测试任务（如果是 PR，只跑这个）
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7 # 假设当前最新稳定版
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --all-extras --dev

      # - name: Run Tests & Lint
      #   run: |
      #     # 如果你有测试，放开下面这行
      #     # uv run pytest
      #     uv run ruff check .

  # 2. 构建与部署任务（仅限 Push 到主分支）
  build-and-deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/wx-auto-push:latest
          # 增加缓存配置，大幅提升后续构建速度
          cache-from: type=gha
          cache-to: type=gha,mode=max