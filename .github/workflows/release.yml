name: Release

on:
  push:
    tags:
      - "v*" # 当推送以 v 开头的标签时触发

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
   
    # --- 权限写在这里 ---
    permissions:
      contents: write  # 允许读取代码并回写 Release 附件
      packages: write  # (可选) 如果你需要推送到 GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Build EXE (Windows)
        # 只有在 Windows 运行时才执行打包 exe
        if: matrix.os == 'windows-latest'
        run: |
          uvx pyinstaller --onefile --clean main.py --name wx-auto-push

      - name: Build Python Package (Source & Wheel)
        if: matrix.os == 'windows-latest'
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/* # 自动将 uv 生成的包上传到 Release
        # 核心配置：自动根据 PR 生成更新日志并填入 Release 内容框
        generate_release_notes: true
        # 从项目根目录下的 CHANGELOG.md 读取正文
        body_path: CHANGELOG.md
        # 如果文件不存在，是否报错（建议设为 false，防止流程中断）
        fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
